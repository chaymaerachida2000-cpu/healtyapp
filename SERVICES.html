<body>

    <div class="banair-container">
        <nav class="desktop-nav">
            <ul class="flex-container">
                <li class="flex-item">
                    <i class="fa-solid fa-laptop-medical"></i>

    <section id="home">
        <div class="title"> 
            <h1>Surveil your health 🍎</h1>

        <div class="services-grid">
           <button class="service-btn-square" onclick="showImage('water')">

                <span id="water-tracker">Water Tracker</span>
            </button>
            <button class="service-btn-square" onclick="showImage('GYM')">
                <i class="fa-solid fa-dumbbell"></i>
                <span id="Gym-Coaching">Gym Coaching</span>
            </button>
                 <button class="service-btn-square" onclick="showImage('Food')">
                <i class="fa-solid fa-apple-whole"></i>
                <span id="Healty-Food">Healthy Food</span>
            </button>
        </div>

        <img id="dynamic-img" src="" alt="" style="max-width: 100%; border-radius: 10px; display: none;">
